<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Document</title>
</head>
<body>
    <button class="recreate-btn">Create New Grid</button>
    <div class="main-container"></div>
    <div class="modal-overlay">

            <p class="modal-text">Type a number to set a size of a grid from 1 to 100</p>

            <button class="modal-button">Let's build it!</button>
        </div>
    </div>
</body>
<script src="logic.js"></script>
</html>
